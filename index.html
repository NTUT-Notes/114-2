<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --sidebar-width: 320px; }
        body { background-color: #f4f7f9; height: 100vh; overflow: hidden; }
        #sidebar { width: var(--sidebar-width); height: 100vh; background: white; border-right: 1px solid #dee2e6; overflow-y: auto; z-index: 1000; }
        .tree-group { margin-left: 1rem; border-left: 1px solid #e9ecef; }
        .tree-item { padding: 8px 12px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; font-size: 0.9rem; color: #495057; text-decoration: none; }
        .tree-item:hover { background-color: #f0f4f8; color: #0d6efd; }
        .active-file { background-color: #e7f1ff !important; color: #0d6efd !important; font-weight: 600; }
        #main-content { height: 100vh; overflow: hidden; position: relative; }
        #pdf-viewer { width: 100%; height: 100%; border: none; }
        .placeholder-view { display: flex; align-items: center; justify-content: center; height: 100%; color: #adb5bd; flex-direction: column; }
        @media (max-width: 991.98px) { #sidebar { width: 100%; } #main-content { display: none; } }
        .rotate-icon { transition: transform 0.2s; }
        .collapsed .rotate-icon { transform: rotate(-90deg); }
    </style>
</head>
<body>

<div class="d-flex">
    <nav id="sidebar" class="p-3">
        <div class="d-flex align-items-center mb-4 px-2">
            <i class="bi bi-collection-play-fill text-primary fs-3 me-2"></i>
            <h5 id="site-header" class="mb-0 fw-bold">Loading...</h5>
        </div>
        <div id="file-tree">
            <div class="text-center py-5">
                <div class="spinner-border spinner-border-sm text-primary"></div>
            </div>
        </div>
    </nav>

    <main id="main-content" class="flex-grow-1">
        <div id="pdf-viewer">
            <div class="placeholder-view">
                <i class="bi bi-file-earmark-pdf" style="font-size: 4rem;"></i>
                <h4 id="placeholder-title" class="mt-3"></h4>
                <p id="placeholder-subtitle"></p>
            </div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfobject/2.2.12/pdfobject.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const isMobile = () => window.innerWidth < 992;

    // 初始化設定與資料
    async function init() {
        try {
            // 同時讀取設定檔與檔案列表
            const [settingsRes, filesRes] = await Promise.all([
                fetch('./settings.json'),
                fetch('./files.json')
            ]);
            
            const settings = await settingsRes.json();
            const files = await filesRes.json();

            // 1. 注入設定檔內容
            document.title = settings.pageTitle;
            document.getElementById('site-header').textContent = settings.sidebarHeader;
            document.getElementById('placeholder-title').textContent = settings.placeholder.title;
            document.getElementById('placeholder-subtitle').textContent = settings.placeholder.subtitle;

            // 2. 渲染檔案樹
            const treeRoot = document.getElementById('file-tree');
            treeRoot.innerHTML = ''; 
            createTree(files, treeRoot);

        } catch (err) {
            console.error("Initialization failed:", err);
            document.getElementById('site-header').textContent = "載入出錯";
        }
    }

    function createTree(data, container) {
        data.forEach(item => {
            const wrapper = document.createElement('div');
            if (item.type === 'directory') {
                const folderId = 'f-' + Math.random().toString(36).substr(2, 9);
                wrapper.innerHTML = `
                    <div class="tree-item fw-medium" data-bs-toggle="collapse" data-bs-target="#${folderId}">
                        <i class="bi bi-chevron-down rotate-icon me-2 small"></i>
                        <i class="bi bi-folder-fill text-warning me-2"></i>
                        ${item.name}
                    </div>
                    <div class="collapse show tree-group" id="${folderId}"></div>
                `;
                container.appendChild(wrapper);
                createTree(item.children, wrapper.querySelector('.tree-group'));
            } else {
                const fileLink = document.createElement('a');
                fileLink.className = 'tree-item file-node';
                fileLink.href = item.url;
                fileLink.innerHTML = `
                    <i class="bi bi-file-earmark-pdf-fill text-danger me-2 ms-3"></i>
                    <span class="text-truncate">${item.name}</span>
                `;
                fileLink.onclick = (e) => {
                    e.preventDefault();
                    handleFileClick(item.url, fileLink);
                };
                container.appendChild(fileLink);
            }
        });
    }

    function handleFileClick(url, element) {
        if (isMobile()) {
            window.open(url, '_blank');
        } else {
            document.querySelectorAll('.file-node').forEach(el => el.classList.remove('active-file'));
            element.classList.add('active-file');
            PDFObject.embed(url, "#pdf-viewer", {
                pdfOpenParams: { view: 'FitH', pagemode: 'thumbs' }
            });
        }
    }

    init(); // 啟動
</script>

</body>
</html>
